{% extends "dashboard_base.html" %}

{% block content %}

<div class="container" style="max-width:600px;">

    <h2 class="mb-3">👤 My Profile</h2>

    <!-- Profile Image -->
    {% if user.profile_image %}
        <img src="{{ user.profile_image.url }}" 
             style="height:120px; width:120px; border-radius:50%; margin-bottom:15px;">
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Username (readonly) -->
        <label>Username</label>
        <input type="text" value="{{ user.username }}" class="form-control mb-2" disabled>

        <!-- First Name -->
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ user.first_name }}" class="form-control mb-2">

        <!-- Last Name -->
        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ user.last_name }}" class="form-control mb-2">

        <!-- Email -->
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}" class="form-control mb-2">

        <!-- Bio -->
        <label>Bio</label>
        <textarea name="bio" class="form-control mb-2">{{ user.bio }}</textarea>

        <!-- Profile Image -->
        <label>Profile Image</label>
        <input type="file" name="profile_image" class="form-control mb-3">

        <!-- Groups (READ ONLY DISPLAY) -->
        <label>Groups</label>
        <input type="text" 
               value="{% for g in user.groups.all %}{{ g.name }} {% endfor %}" 
               class="form-control mb-3" disabled>

        <button class="btn btn-primary">Update Profile</button>
    </form>

</div>

{% endblock %}
