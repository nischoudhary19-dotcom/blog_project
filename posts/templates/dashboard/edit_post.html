{% extends "dashboard_base.html" %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .blog-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .blog-card {
        width: 100%;
        max-width: 750px;
        padding: 35px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255,255,255,0.4);
    }

    .blog-title {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #111827;
    }

    .blog-subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 25px;
    }

    .blog-form p {
        margin-bottom: 20px;
    }

    .blog-form label {
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
        display: block;
    }

    .blog-form input,
    .blog-form textarea,
    .blog-form select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        font-size: 14px;
        transition: all 0.25s ease;
    }

    .blog-form textarea {
        min-height: 120px;
        resize: vertical;
    }

    .blog-form input:focus,
    .blog-form textarea:focus,
    .blog-form select:focus {
        border-color: #6366f1;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        outline: none;
    }

    .file-input {
        padding: 10px;
        background: #fff;
        border: 1px dashed #c7d2fe;
        cursor: pointer;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        cursor: pointer;
        transition: all 0.25s ease;
        margin-top: 10px;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(79,70,229,0.25);
    }

    .submit-btn:active {
        transform: scale(0.97);
    }

    .form-divider {
        height: 1px;
        background: #e5e7eb;
        margin: 20px 0;
    }
</style>

<div class="blog-wrapper">
    <div class="blog-card">

        <div class="blog-title">✏️ Edit Blog</div>
        <div class="blog-subtitle">Update your post</div>

        <!-- ✅ Show current image -->
        {% if post.image %}
            <img src="{{ post.image.url }}" class="img-fluid mb-3" style="border-radius:10px;">
        {% endif %}

        <form method="POST" enctype="multipart/form-data" class="blog-form">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-divider"></div>

            <button type="submit" class="submit-btn">
                ✅ Update Blog
            </button>

        </form>

    </div>
</div>

{% endblock %}
