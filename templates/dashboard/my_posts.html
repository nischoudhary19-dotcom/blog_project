{% extends "dashboard_base.html" %}

{% block content %}

<h1 class="text-center mb-5">My Blog Posts</h1>

<div class="row">

{% for post in posts %}

<div class="col-md-4 mb-4">

<div class="card shadow h-100">

    {% if post.image %}
    <img src="{{ post.image.url }}" class="card-img-top" style="height:100px; object-fit:cover;">
    {% endif %}

    <div class="card-body">

        <h5 class="card-title">{{ post.title }}</h5>

        <p class="text-muted">
            Author: {{ post.author }} | Category: {{ post.category }}
        </p>

        <p class="card-text">
            {{ post.content|truncatewords:20|safe }}
        </p>

    </div>

    <div class="card-footer bg-white border-0">

        <a href="{% url 'post_detail' post.slug %}" class="btn btn-primary btn-sm">
            Read
        </a>

        <a href="{% url 'edit_post' post.id %}" class="btn btn-warning btn-sm">
            Edit
        </a>

        <a href="{% url 'delete_post' post.id %}" class="btn btn-danger btn-sm">
            Delete
        </a>

    </div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
