{% extends "dashboard_base.html" %}

{% block content %}

<div class="container">

    <h1 class="mb-3">{{ post.title }}</h1>

    <p class="text-muted">
        Author: {{ post.author }} | Published on: {{ post.created_at }}
    </p>

    {% if post.image %}
        <img src="{{ post.image.url }}" class="img-fluid mb-4">
    {% endif %}

    <div>
        {{ post.content|safe }}
    </div>

</div>

{% endblock %}
