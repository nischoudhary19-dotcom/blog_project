<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{{ post.title }}</h1>
    <p>Author: {{ post.author }}</p>
    <p>Published on: {{ post.created_at }}</p>
    {% if post.image %}
    <img src="{{ post.image.url }}" width="500">
    {% endif %}

    <div>
        {{ post.content|safe }}
    </div>
    
</body>
</html>
